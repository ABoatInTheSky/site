<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 - ABoatInTheSky</title>
    <link rel="icon" type="image/png" href="/favicon.png">

    <style>
        :root {
          --bg-top: #020617;
          --bg-bottom: #0f172a;
          --text: #e5e7eb;
          --muted: #94a3b8;

          --accent-external: #38bdf8;
          --accent-internal: #6ed2ff;

          --border-strong: rgba(148, 163, 184, 0.22);

          --radius-lg: 1.6rem;

          --shadow: 0 1rem 3rem rgba(0, 0, 0, 0.22);

          --content-width: min(94vw, 78rem);

          --space-2: 0.75rem;
          --space-3: 1rem;
          --space-4: 1.5rem;
          --space-5: 2rem;
          --space-6: 3rem;

          --font-base: 1rem;
          --font-lg: 1.125rem;
          --font-xl: clamp(1.8rem, 4vw, 3rem);
          --font-hero: clamp(3rem, 10vw, 7rem);
        }

        * { box-sizing: border-box; }

        html {
          height: 100%;
        }

        body {
          margin: 0;
          min-height: 100%;
          display: flex;
          flex-direction: column;
          font-family: Arial, sans-serif;
          background:
            radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 35%),
            linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
          color: var(--text);
        }

        main {
          flex: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: var(--space-6) 0;
        }

        a {
          color: inherit;
          text-decoration: none;
        }

        /* NAV */

        .site-header {
          position: sticky;
          top: 0;
          backdrop-filter: blur(0.9rem);
          background: rgba(2,6,23,0.76);
          border-bottom: 0.08rem solid rgba(148,163,184,0.14);
        }

        .nav {
          width: var(--content-width);
          margin: auto;
          display: flex;
          justify-content: space-between;
          padding: var(--space-3) 0;
          flex-wrap: wrap;
        }

        .nav-links {
          display: flex;
          gap: var(--space-2);
        }

        .nav-links a {
          color: var(--muted);
          padding: 0.5rem 0.8rem;
          border-radius: 999rem;
        }

        .nav-links a:hover {
          background: rgba(148,163,184,0.1);
          color: var(--text);
        }

        /* 404 CARD */

        .error-card {
          width: var(--content-width);
          text-align: center;
          background: linear-gradient(180deg, rgba(17,24,39,0.86), rgba(15,23,42,0.92));
          border: 0.08rem solid var(--border-strong);
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow);
          padding: clamp(2rem, 5vw, 4rem);
        }

        .error-code {
          font-size: var(--font-hero);
          font-weight: 800;
          margin: 0;
          color: var(--accent-external);
        }

        .error-text {
          font-size: var(--font-xl);
          margin: var(--space-3) 0 var(--space-2);
        }

        .error-desc {
          color: var(--muted);
          margin-bottom: var(--space-4);
        }

        /* BUTTON */

        .button {
          display: inline-flex;
          justify-content: center;
          align-items: center;
          padding: 0.9rem 1.4rem;
          border-radius: 999rem;
          font-weight: bold;
          background: var(--accent-internal);
          color: #082f49;
          transition: 0.2s;
        }

        .button:hover {
          transform: translateY(-0.12rem);
          box-shadow: 0 0.8rem 1.8rem rgba(110, 210, 255, 0.25);
        }

        /* FOOTER */

        .site-footer {
          width: var(--content-width);
          margin: 0 auto;
          padding: var(--space-4) 0;
          border-top: 0.08rem solid rgba(148,163,184,0.12);
          color: rgba(148,163,184,0.5);
        }

        .footer-links {
          display: flex;
          gap: var(--space-2);
          margin-bottom: var(--space-2);
          flex-wrap: wrap;
        }

        .footer-links a {
          color: var(--muted);
        }

        .footer-links a:hover {
          color: var(--text);
        }

        /* MOBILE */

        @media (max-width: 48rem) {
          .nav {
            justify-content: center;
          }

          .error-card {
            margin: 0 var(--space-3);
          }
        }
    </style>
</head>

<body>

<header class="site-header">
    <nav class="nav">
        <a href="/">ABoatInTheSky</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/#about">About</a>
            <a href="/projects/">Projects</a>
            <a href="/web-games/">Web Games</a>
        </div>
    </nav>
</header>

<main>
    <div class="error-card">
        <h1 class="error-code">404</h1>
        <div class="error-text">Page not found</div>
        <p class="error-desc">
            This page does not exist… or maybe it fell off the boat 🚤
        </p>
        <a class="button" href="/">Go Home</a>
    </div>
</main>

<footer class="site-footer">
    <div class="footer-links">
        <a href="/">Home</a>
        <a href="/projects/">Projects</a>
        <a href="/web-games/">Web Games</a>
    </div>
    <p>© 2026 A Boat In The Sky. All rights reserved.</p>
</footer>

</body>
</html>
